services:
  db:
    image: postgres:15
    restart: always
    networks:
      - agali-network
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    restart: always
    networks:
      - agali-network
    env_file:
      - .env
    volumes:
      - uploads:/app/public/images
    ports:
      - "3001:3001"
    depends_on:
      - db

  caddy:
    image: caddy:2-alpine
    restart: always
    networks:
      - agali-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
  caddy_data:
  caddy_config:

networks:
  agali-network:
    external: true
    name: agali-shared-net